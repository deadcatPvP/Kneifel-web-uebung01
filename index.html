<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Webseite</title>
</head>
<body style="background-color: lightblue;">
    <h1>Vorname Nachname – 111</h1>
    
    <h2>Persönliche Daten</h2>
    <p>
        Geburtsdatum: 01.01.2000<br>
        Lieblingsfarbe: lightblue
    </p>
    
    <h2>Meine Lieblingsfächer</h2>
    <ol>
        <li>Religion</li>
        <li>Sport</li>
        <li>Informatik</li>
    </ol>
    
    <h2>Meine Hobbys</h2>
    <ul id="liste-hobbys">
    </ul>
    
    <h2>Freies Bild</h2>
    <figure>
        <img src="imgbild1.jpg" width="400" height="auto" title="Freies Bild" alt="Ein freies Bild">
        <figcaption>
            Bild: <a href="#" target="_blank">Alexander Migl</a> | 
            Link zum Bild: <a href="https://commons.wikimedia.org/wiki/File:Porsche_992_GT3_1X7A0323.jpg</a> |  
            Titel: <a href="#" target="_blank">Titel des Bildes</a> | 
            Lizenz: <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a>
        </figcaption>
    </figure>

    <script>
      const hobbys = ["Lesen", "Programmieren", "Sport","Theo"];
      const liste = document.getElementById("liste-hobbys");
      hobbys.forEach(h => {
        let li = document.createElement("li");
        li.textContent = h;
        liste.appendChild(li);
      });
    </script>
</body>
</html>
